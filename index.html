<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Han的股票小窩</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .search-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        .quick-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .quick-btn {
            padding: 10px;
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .quick-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .result {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .result.show {
            display: block;
        }
        
        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }
        
        .stock-symbol {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }
        
        .stock-price {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stock-change {
            font-size: 1.1em;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .change-up {
            color: #22c55e;
            background: #f0fdf4;
        }
        
        .change-down {
            color: #ef4444;
            background: #fef2f2;
        }
        
        .stock-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        
        .detail-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
        }
        
        .detail-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .detail-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }
        
        .watchlist {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .watchlist h2 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .watchlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .watchlist-item-symbol {
            font-weight: bold;
            color: #667eea;
        }
        
        .watchlist-item-price {
            font-weight: bold;
        }
        
        .remove-btn {
            background: #ef4444;
            padding: 5px 10px;
            font-size: 0.8em;
        }
        
        .remove-btn:hover {
            background: #dc2626;
        }
        
        .loading {
            text-align: center;
            color: #666;
        }
        
        .error {
            background: #fef2f2;
            color: #ef4444;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 Han的股票小窩</h1>
            <p>實時股票價格查詢</p>
        </div>
        
        <div class="search-box">
            <div class="input-group">
                <input 
                    type="text" 
                    id="symbolInput" 
                    placeholder="輸入股票代碼(如: AAPL, 2330, TSLA, 0050)"
                    autocomplete="off"
                >
                <button onclick="searchStock()">搜尋</button>
            </div>
            
            <div class="quick-buttons">
                <button class="quick-btn" onclick="quickSearch('AAPL')">AAPL</button>
                <button class="quick-btn" onclick="quickSearch('2330')">2330</button>
                <button class="quick-btn" onclick="quickSearch('TSLA')">TSLA</button>
                <button class="quick-btn" onclick="quickSearch('0050')">0050</button>
            </div>
        </div>
        
        <div id="result" class="result">
            <div class="stock-header">
                <div>
                    <div class="stock-symbol" id="resultSymbol"></div>
                </div>
                <div style="text-align: right;">
                    <div class="stock-price" id="resultPrice"></div>
                    <div class="stock-change" id="resultChange"></div>
                </div>
            </div>
            
            <div class="stock-details">
                <div class="detail-item">
                    <div class="detail-label">漲跌</div>
                    <div class="detail-value" id="resultChangeAmount"></div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">成交量</div>
                    <div class="detail-value" id="resultVolume"></div>
                </div>
            </div>
            
            <div style="margin-top: 15px;">
                <button onclick="addToWatchlist()" style="width: 100%;">⭐ 加入自選股</button>
            </div>
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <div class="watchlist">
            <h2>📌 我的自選股</h2>
            <div id="watchlistContainer"></div>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://my-repository.vercel.app/api/stock';
        let currentSymbol = '';
        
        // Load watchlist from localStorage
        function loadWatchlist() {
            const watchlist = JSON.parse(localStorage.getItem('watchlist') || '[]');
            const container = document.getElementById('watchlistContainer');
            
            if (watchlist.length === 0) {
                container.innerHTML = '<p style="color: #999;">還沒有自選股，快加一個吧！</p>';
                return;
            }
            
            container.innerHTML = watchlist.map(symbol => `
                <div class="watchlist-item">
                    <span class="watchlist-item-symbol">${symbol}</span>
                    <button class="remove-btn" onclick="removeFromWatchlist('${symbol}')">移除</button>
                </div>
            `).join('');
        }
        
        function addToWatchlist() {
            if (!currentSymbol) return;
            
            let watchlist = JSON.parse(localStorage.getItem('watchlist') || '[]');
            if (!watchlist.includes(currentSymbol)) {
                watchlist.push(currentSymbol);
                localStorage.setItem('watchlist', JSON.stringify(watchlist));
                loadWatchlist();
                alert(`已加入自選股：${currentSymbol}`);
            } else {
                alert(`${currentSymbol} 已在自選股中`);
            }
        }
        
        function removeFromWatchlist(symbol) {
            let watchlist = JSON.parse(localStorage.getItem('watchlist') || '[]');
            watchlist = watchlist.filter(s => s !== symbol);
            localStorage.setItem('watchlist', JSON.stringify(watchlist));
            loadWatchlist();
        }
        
        function quickSearch(symbol) {
            document.getElementById('symbolInput').value = symbol;
            searchStock();
        }
        
        async function searchStock() {
            const symbol = document.getElementById('symbolInput').value.trim().toUpperCase();
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');
            
            if (!symbol) {
                errorDiv.textContent = '請輸入股票代碼';
                errorDiv.style.display = 'block';
                resultDiv.classList.remove('show');
                return;
            }
            
            errorDiv.style.display = 'none';
            
            try {
                const response = await fetch(`${API_URL}?symbol=${symbol}`);
                const data = await response.json();
                
                if (data.error) {
                    errorDiv.textContent = `❌ ${data.error}`;
                    errorDiv.style.display = 'block';
                    resultDiv.classList.remove('show');
                    return;
                }
                
                currentSymbol = data.symbol;
                
                // Display results
                document.getElementById('resultSymbol').textContent = data.symbol;
                document.getElementById('resultPrice').textContent = `$${data.currentPrice.toFixed(2)}`;
                
                const changePercent = data.changePercent;
                const changeAmount = data.change;
                const isUp = changePercent >= 0;
                
                const changeDiv = document.getElementById('resultChange');
                changeDiv.className = `stock-change ${isUp ? 'change-up' : 'change-down'}`;
                changeDiv.textContent = `${isUp ? '📈' : '📉'} ${isUp ? '+' : ''}${changePercent.toFixed(2)}%`;
                
                document.getElementById('resultChangeAmount').textContent = `${isUp ? '+' : ''}${changeAmount.toFixed(2)}`;
                document.getElementById('resultVolume').textContent = data.volume.toLocaleString();
                
                resultDiv.classList.add('show');
                
            } catch (error) {
                errorDiv.textContent = `❌ 連接失敗：${error.message}`;
                errorDiv.style.display = 'block';
                resultDiv.classList.remove('show');
            }
        }
        
        // Allow Enter key to search
        document.getElementById('symbolInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchStock();
            }
        });
        
        // Load watchlist on page load
        loadWatchlist();
    </script>
</body>
</html>
