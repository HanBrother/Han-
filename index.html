<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時股票價格查詢</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box input {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .search-box button {
            padding: 12px 30px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
        }

        .search-box button:hover {
            transform: translateY(-2px);
        }

        .search-box button:active {
            transform: translateY(0);
        }

        .price-display {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            display: none;
        }

        .price-display.show {
            display: block;
        }

        .price-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        .stock-symbol {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .add-watchlist-btn {
            padding: 8px 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .add-watchlist-btn:hover {
            background: #764ba2;
        }

        .add-watchlist-btn.added {
            background: #4caf50;
        }

        .price-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.9em;
            color: #999;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
        }

        .info-value.positive {
            color: #4caf50;
        }

        .info-value.negative {
            color: #f44336;
        }

        .last-update {
            text-align: right;
            font-size: 0.85em;
            color: #999;
        }

        .error-message {
            background: #f44336;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .watchlist {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        .watchlist h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .watchlist-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .watchlist-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.3s;
        }

        .watchlist-item:hover {
            background: #efefef;
        }

        .watchlist-item-name {
            font-weight: bold;
            color: #333;
        }

        .watchlist-item-price {
            color: #667eea;
            font-weight: bold;
        }

        .remove-btn {
            background: #f44336;
            color: white;
            border: none;
            border-radius: 3px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.8em;
        }

        .remove-btn:hover {
            background: #d32f2f;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 即時股票價格</h1>
            <p>輸入股票代碼查詢（如：2330、AAPL）</p>
        </div>

        <div class="search-box">
            <input type="text" id="stockInput" placeholder="輸入股票代碼..." />
            <button onclick="searchStock()">查詢</button>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="price-display" id="priceDisplay">
            <div class="price-header">
                <div class="stock-symbol" id="stockSymbol"></div>
                <button class="add-watchlist-btn" id="addWatchlistBtn" onclick="addToWatchlist()">加入收藏</button>
            </div>

            <div class="price-info">
                <div class="info-item">
                    <div class="info-label">當前價格</div>
                    <div class="info-value" id="currentPrice">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">漲跌幅</div>
                    <div class="info-value" id="changePercent">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">漲跌金額</div>
                    <div class="info-value" id="changeAmount">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">成交量</div>
                    <div class="info-value" id="volume">-</div>
                </div>
            </div>

            <div class="last-update" id="lastUpdate"></div>
        </div>

        <div class="watchlist">
            <h2>⭐ 我的收藏</h2>
            <div class="watchlist-items" id="watchlistItems"></div>
        </div>
    </div>

    <script>
        // ⚠️ 重要：改成你的 Vercel URL
        const API_URL = 'https://han-stock-nest.vercel.app/api/stock';
        let currentStock = null;

        // 初始化
        function init() {
            loadWatchlist();
            document.getElementById('stockInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchStock();
            });
        }

        // 搜尋股票
        async function searchStock() {
            const symbol = document.getElementById('stockInput').value.trim().toUpperCase();
            
            if (!symbol) {
                showError('請輸入股票代碼');
                return;
            }

            try {
                showLoading();
                const response = await fetch(`${API_URL}?symbol=${symbol}`);
                
                if (!response.ok) {
                    throw new Error('查詢失敗');
                }

                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                currentStock = data;
                displayPrice(data);
                hideError();
                updateWatchlistButton();
            } catch (error) {
                console.error('Error:', error);
                showError('無法連接到服務器，請稍後重試');
            }
        }

        // 顯示價格
        function displayPrice(data) {
            const display = document.getElementById('priceDisplay');
            
            document.getElementById('stockSymbol').textContent = data.symbol;
            document.getElementById('currentPrice').textContent = `$${data.price.toFixed(2)}`;
            
            const changePercentEl = document.getElementById('changePercent');
            const changePercent = parseFloat(data.changePercent);
            changePercentEl.textContent = `${changePercent >= 0 ? '+' : ''}${changePercent.toFixed(2)}%`;
            changePercentEl.className = `info-value ${changePercent >= 0 ? 'positive' : 'negative'}`;
            
            const changeAmountEl = document.getElementById('changeAmount');
            const changeAmount = parseFloat(data.change);
            changeAmountEl.textContent = `${changeAmount >= 0 ? '+' : ''}$${changeAmount.toFixed(2)}`;
            changeAmountEl.className = `info-value ${changeAmount >= 0 ? 'positive' : 'negative'}`;
            
            document.getElementById('volume').textContent = formatVolume(data.volume);
            document.getElementById('lastUpdate').textContent = `更新時間：${new Date().toLocaleString('zh-TW')}`;
            
            display.classList.add('show');
        }

        // 格式化成交量
        function formatVolume(volume) {
            if (volume >= 1000000) {
                return (volume / 1000000).toFixed(2) + 'M';
            } else if (volume >= 1000) {
                return (volume / 1000).toFixed(2) + 'K';
            }
            return volume.toString();
        }

        // 加入收藏
        function addToWatchlist() {
            if (!currentStock) return;

            let watchlist = JSON.parse(localStorage.getItem('watchlist')) || [];
            
            if (!watchlist.find(item => item.symbol === currentStock.symbol)) {
                watchlist.push(currentStock);
                localStorage.setItem('watchlist', JSON.stringify(watchlist));
                loadWatchlist();
                updateWatchlistButton();
            }
        }

        // 從收藏移除
        function removeFromWatchlist(symbol) {
            let watchlist = JSON.parse(localStorage.getItem('watchlist')) || [];
            watchlist = watchlist.filter(item => item.symbol !== symbol);
            localStorage.setItem('watchlist', JSON.stringify(watchlist));
            loadWatchlist();
            updateWatchlistButton();
        }

        // 載入收藏
        function loadWatchlist() {
            const watchlist = JSON.parse(localStorage.getItem('watchlist')) || [];
            const container = document.getElementById('watchlistItems');

            if (watchlist.length === 0) {
                container.innerHTML = '<div class="empty-message">還沒有收藏任何股票</div>';
                return;
            }

            container.innerHTML = watchlist.map(item => `
                <div class="watchlist-item" onclick="searchBySymbol('${item.symbol}')">
                    <div>
                        <div class="watchlist-item-name">${item.symbol}</div>
                        <div class="watchlist-item-price">$${parseFloat(item.price).toFixed(2)}</div>
                    </div>
                    <button class="remove-btn" onclick="event.stopPropagation(); removeFromWatchlist('${item.symbol}')">移除</button>
                </div>
            `).join('');
        }

        // 通過收藏搜尋
        function searchBySymbol(symbol) {
            document.getElementById('stockInput').value = symbol;
            searchStock();
        }

        // 更新收藏按鈕狀態
        function updateWatchlistButton() {
            const btn = document.getElementById('addWatchlistBtn');
            if (!currentStock) {
                btn.classList.remove('added');
                return;
            }

            const watchlist = JSON.parse(localStorage.getItem('watchlist')) || [];
            if (watchlist.find(item => item.symbol === currentStock.symbol)) {
                btn.classList.add('added');
                btn.textContent = '已收藏';
            } else {
                btn.classList.remove('added');
                btn.textContent = '加入收藏';
            }
        }

        // 顯示錯誤
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            document.getElementById('priceDisplay').classList.remove('show');
        }

        // 隱藏錯誤
        function hideError() {
            document.getElementById('errorMessage').classList.remove('show');
        }

        // 顯示載入中
        function showLoading() {
            const display = document.getElementById('priceDisplay');
            display.classList.add('show');
            document.getElementById('stockSymbol').textContent = '載入中...';
        }

        // 初始化
        init();
    </script>
</body>
</html>
